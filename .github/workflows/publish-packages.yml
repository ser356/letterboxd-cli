name: Publish package manifests

# Se ejecuta cada vez que se publica un Release. También lanzable a mano
# para reintentar sobre un tag existente.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/versión del release ya existente (ej. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout letterboxd-cli
        uses: actions/checkout@v4

      - name: Resolve tag / version
        id: v
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag=$TAG  Version=$VERSION"

      - name: Descargar artifacts del release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "${{ steps.v.outputs.tag }}" \
            -R "${{ github.repository }}" \
            -p 'letterboxd-cli-*.tar.gz' \
            -p 'letterboxd-cli-*.zip' \
            -D artifacts
          echo "Artifacts descargados:"
          ls -la artifacts/

      - name: Calcular SHA256
        id: sha
        run: |
          cd artifacts
          SHA_MAC_ARM64=$(sha256sum letterboxd-cli-macos-arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_X86_64=$(sha256sum letterboxd-cli-linux-x86_64.tar.gz | awk '{print $1}')
          SHA_WIN_X86_64=$(sha256sum letterboxd-cli-windows-x86_64.zip | awk '{print $1}')
          echo "mac_arm64=$SHA_MAC_ARM64"     >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$SHA_LINUX_X86_64" >> "$GITHUB_OUTPUT"
          echo "win_x86_64=$SHA_WIN_X86_64"   >> "$GITHUB_OUTPUT"

      # ---------- HOMEBREW TAP ----------
      - name: Render fórmula Homebrew
        run: |
          mkdir -p out
          sed \
            -e "s|{{VERSION}}|${{ steps.v.outputs.version }}|g" \
            -e "s|{{SHA_MAC_ARM64}}|${{ steps.sha.outputs.mac_arm64 }}|g" \
            -e "s|{{SHA_LINUX_X86_64}}|${{ steps.sha.outputs.linux_x86_64 }}|g" \
            packaging/homebrew/letterboxd-cli.rb.tmpl > out/letterboxd-cli.rb
          echo "----- fórmula generada -----"
          cat out/letterboxd-cli.rb

      - name: Push a ser356/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ser356/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp out/letterboxd-cli.rb tap/Formula/letterboxd-cli.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/letterboxd-cli.rb
          if git diff --cached --quiet; then
            echo "No hay cambios en la fórmula."
          else
            git commit -m "letterboxd-cli ${{ steps.v.outputs.tag }}"
            git push
          fi

      # ---------- SCOOP BUCKET ----------
      - name: Render manifest Scoop
        run: |
          sed \
            -e "s|{{VERSION}}|${{ steps.v.outputs.version }}|g" \
            -e "s|{{SHA_WIN_X86_64}}|${{ steps.sha.outputs.win_x86_64 }}|g" \
            packaging/scoop/letterboxd-cli.json.tmpl > out/letterboxd-cli.json
          echo "----- manifest generado -----"
          cat out/letterboxd-cli.json

      - name: Push a ser356/scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ser356/scoop-bucket.git" bucket
          # La convención de Scoop es que los manifests vivan en `bucket/` o
          # en la raíz. Usamos `bucket/` (permite `scoop bucket add …` limpio).
          mkdir -p bucket/bucket
          cp out/letterboxd-cli.json bucket/bucket/letterboxd-cli.json
          cd bucket
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/letterboxd-cli.json
          if git diff --cached --quiet; then
            echo "No hay cambios en el manifest."
          else
            git commit -m "letterboxd-cli ${{ steps.v.outputs.tag }}"
            git push
          fi
